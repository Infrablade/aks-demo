trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  acrName: acraksdemocap.azurecr.io
  imageName: demo-app
  aksName: aks-demo
  resourceGroup: rg-aks-demo
  imageTag: $(Build.SourceVersion)

stages:
  # ── 1. Unit Tests ─────────────────────────────────────────────
  - stage: Test
    displayName: Unit Tests
    jobs:
      - job: UnitTest
        displayName: Run pytest
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"

          - script: pip install -r app/requirements.txt
            displayName: Install dependencies

          - script: |
              cd app
              pytest tests/test_app.py -v \
                --junitxml=test-results.xml
            displayName: Run unit tests

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "app/test-results.xml"
              testRunTitle: Unit Tests

  # ── 2. Build & Push ───────────────────────────────────────────
  - stage: Build
    displayName: Build & Push Image
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildPush
        displayName: Build and push to ACR
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build and push to ACR
            inputs:
              containerRegistry: "acr-service-connection"
              repository: $(imageName)
              command: buildAndPush
              Dockerfile: app/Dockerfile
              buildContext: app/
              tags: |
                $(imageTag)
                latest

  # ── 3. Trivy Scan ─────────────────────────────────────────────
  - stage: Scan
    displayName: Security Scan
    dependsOn: Build
    jobs:
      - job: TrivyScan
        displayName: Trivy image scan
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Pull image from ACR
            inputs:
              azureSubscription: "azure-service-connection"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name acraksdemocap
                docker pull $(acrName)/$(imageName):$(imageTag)

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(Build.SourcesDirectory):/src \
                aquasec/trivy:latest image \
                --exit-code 1 \
                --severity CRITICAL,HIGH \
                --ignorefile /src/app/.trivyignore \
                $(acrName)/$(imageName):$(imageTag)
            displayName: Run Trivy scan

  # ── 4. Deploy ─────────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to AKS
    dependsOn: Scan
    jobs:
      - deployment: DeployToAKS
        displayName: Deploy to AKS
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Get AKS credentials
                  inputs:
                    azureSubscription: "azure-service-connection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(resourceGroup) \
                        --name $(aksName)

                - script: |
                    sed -i "s|:latest|:$(imageTag)|g" k8s/deployment.yaml
                  displayName: Pin image tag

                - task: KubernetesManifest@1
                  displayName: Deploy to AKS
                  inputs:
                    action: deploy
                    connectionType: azureResourceManager
                    azureSubscriptionConnection: "azure-service-connection"
                    azureResourceGroup: $(resourceGroup)
                    kubernetesCluster: $(aksName)
                    manifests: |
                      k8s/deployment.yaml
                      k8s/service.yaml

                - task: AzureCLI@2
                  displayName: Rollout check + smoke tests
                  inputs:
                    azureSubscription: "azure-service-connection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(resourceGroup) \
                        --name $(aksName)
                      kubectl rollout status deployment/demo-app --timeout=120s
                      for i in {1..20}; do
                        IP=$(kubectl get svc demo-app -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
                        if [ -n "$IP" ]; then
                          pip install requests
                          python app/tests/smoke_test.py http://$IP
                          break
                        fi
                        sleep 10
                      done